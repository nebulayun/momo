<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗進行中</title>
    <style>
        :root { --primary-color: #2563eb; --bg-color: #f8fafc; }
        body { font-family: -apple-system, "Segoe UI", sans-serif; background: var(--bg-color); line-height: 1.6; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { position: sticky; top: 0; background: white; padding: 10px 0; border-bottom: 2px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        #timer { font-size: 1.2rem; font-weight: bold; color: #dc2626; background: #fee2e2; padding: 5px 15px; border-radius: 20px; }
        .question { margin-bottom: 25px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .question p { font-weight: bold; margin-bottom: 10px; }
        label { display: block; margin: 8px 0; cursor: pointer; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.3s; font-weight: bold;}
        button:hover { background: #1d4ed8; }
        #status-msg { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>期末模擬測驗</h2>
        <div id="timer">剩餘時間：30:00</div>
    </div>

    <form id="quizForm">
        <div style="margin: 20px 0; font-size: 1.1rem;">
            受測者：<strong id="displayName">載入中...</strong>
        </div>

        <hr>

        <div class="question">
            <p>1. JavaScript 中，哪個關鍵字可以用來宣告「不可修改」的常數？</p>
            <label><input type="radio" name="q1" value="var"> var</label>
            <label><input type="radio" name="q1" value="let"> let</label>
            <label><input type="radio" name="q1" value="const"> const</label>
        </div>

        <div class="question">
            <p>2. 下列哪個標籤用於定義 HTML 的超連結？</p>
            <label><input type="radio" name="q2" value="link"> &lt;link&gt;</label>
            <label><input type="radio" name="q2" value="a"> &lt;a&gt;</label>
            <label><input type="radio" name="q2" value="href"> &lt;href&gt;</label>
        </div>

        <button type="submit" id="submitBtn">提交答案</button>
        <p id="status-msg"></p>
    </form>
</div>

<script>
    const FORMSPREE_URL = "https://formspree.io/f/mvzykjye"; 
    const TEST_DURATION = 30 * 60; // 30 分鐘
    let timeLeft;

    const timerDisplay = document.getElementById('timer');
    const form = document.getElementById('quizForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('status-msg');

    // 1. 取得姓名（優先從快取拿，防重開）
    let userName = localStorage.getItem('saved_user_name') || sessionStorage.getItem('quiz_user_name');
    
    if (!userName) {
        alert('請先輸入姓名再開始測驗！');
        window.location.href = 'index.html';
    } else {
        localStorage.setItem('saved_user_name', userName);
        document.getElementById('displayName').textContent = userName;
    }

    // 2. 檢查是否已經被標記為「已交卷」或「偷關網頁」
    if (localStorage.getItem('quiz_submitted') === 'true') {
        form.innerHTML = "<h3>⚠️ 偵測到重複進入或中途關閉網頁！您之前的答案已被強制提交，無法再次作答。</h3>";
        timerDisplay.textContent = "已鎖定";
    }

    // 3. 倒計時與本地即時同步
    let startTime = localStorage.getItem('test_start_time');
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem('test_start_time', startTime);
    }

    // 監聽使用者的選擇，只要一勾選，立刻存到電腦裡，防 Ctrl+W
    form.addEventListener('change', () => {
        const formData = new FormData(form);
        const savedAnswers = {};
        formData.forEach((value, key) => { savedAnswers[key] = value; });
        localStorage.setItem('saved_answers', JSON.stringify(savedAnswers));
    });

    // 恢復之前存下的答案（如果他重開網頁）
    const localAnswers = JSON.parse(localStorage.getItem('saved_answers') || '{}');
    Object.keys(localAnswers).forEach(key => {
        const input = form.querySelector(`input[name="${key}"][value="${localAnswers[key]}"]`);
        if (input) input.checked = true;
    });

    const countdown = setInterval(() => {
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        timeLeft = TEST_DURATION - elapsed;

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerDisplay.textContent = "時間到！";
            sendToFormspree("時間到（強制提交）");
        } else {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            timerDisplay.textContent = `剩餘時間：${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
    }, 1000);

    // 4. 發送資料到 Formspree
    function sendToFormspree(statusText) {
        // 先鎖死本地
        localStorage.setItem('quiz_submitted', 'true');
        
        submitBtn.disabled = true;
        submitBtn.textContent = "正在提交...";
        statusMsg.textContent = "正在發送答案...";

        // 重新打包最新答案
        const finalData = new FormData();
        finalData.append("user_name", userName);
        finalData.append("status", statusText);
        
        // 把存在本地或目前的答案塞進去
        const currentAnswers = JSON.parse(localStorage.getItem('saved_answers') || '{}');
        Object.keys(currentAnswers).forEach(key => {
            finalData.append(key, currentAnswers[key]);
        });

        fetch(FORMSPREE_URL, {
            method: 'POST',
            body: finalData,
            headers: { 'Accept': 'application/json' }
        }).then(res => {
            if (res.ok) {
                statusMsg.style.color = "green";
                statusMsg.textContent = "答案已成功寄出！";
                // 成功後清空答案與時間，但保留 submitted 鎖定標記
                localStorage.removeItem('test_start_time');
                localStorage.removeItem('saved_answers');
            }
        });
    }

    // 手動提交
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        sendToFormspree(`手動準時提交（剩餘 ${mins}分${secs}秒）`);
    });

    // 💡 補刀防線：如果他在考試中途嘗試「重新整理」，在重整的那一刻，順手把答案送出去（通常重整時 fetch 是能成功的）
    window.addEventListener('beforeunload', () => {
        if (localStorage.getItem('quiz_submitted') !== 'true') {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            
            // 標記他打算離開了，下次進來直接鎖死並送出
            localStorage.setItem('quiz_submitted', 'true');
            
            // 嘗試進行最後的微弱發送
            const finalData = new FormData();
            finalData.append("user_name", userName);
            finalData.append("status", `中途關閉或重整（當時剩餘 ${mins}分${secs}秒）`);
            const currentAnswers = JSON.parse(localStorage.getItem('saved_answers') || '{}');
            Object.keys(currentAnswers).forEach(key => finalData.append(key, currentAnswers[key]));
            
            fetch(FORMSPREE_URL, { method: 'POST', body: finalData, headers: { 'Accept': 'application/json' }, keepalive: true });
        }
    });
</script>

</body>
</html>
