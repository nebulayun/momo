<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上測驗 - 登入說明</title>
    <style>
        body { font-family: -apple-system, "Segoe UI", sans-serif; background: #f8fafc; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .rule-box { background: #f1f5f9; padding: 15px; border-radius: 8px; margin: 20px 0; border-left: 4px solid #dc2626; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0 20px 0; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 1rem; width: 100%; font-weight: bold; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 期末模擬測驗說明</h2>
    
    <div class="rule-box">
        <strong>⚠️ 測驗重要守則（請詳閱）：</strong>
        <ul>
            <li>本測驗時間限制為 <strong>30 分鐘</strong>。</li>
            <li>按下「開始測驗」後，倒計時即刻開始，<strong>中途重新整理網頁時間不會重置</strong>。</li>
            <li><strong>請勿中途關閉網頁或離開頁面</strong>。若中途關閉，系統將會在您下次打開時<strong>強制自動交卷</strong>，並以第一次的內容為準。</li>
        </ul>
    </div>

    <form id="loginForm">
        <label><strong>請輸入您的受測者姓名：</strong></label>
        <input type="text" id="userName" required placeholder="例如：王小明">
        <button type="submit">我已瞭解守則，開始測驗</button>
    </form>
</div>

<script>
    // 如果之前已經徹底考完交卷了，不允許再進來
    if (localStorage.getItem('quiz_completed_fully') === 'true') {
        document.body.innerHTML = "<div class='container'><h2>⚠️ 您已完成此測驗，無法重複作答。</h2></div>";
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const name = document.getElementById('userName').value.trim();
        
        // 雙重備份姓名，確保 test.html 絕對抓得到
        sessionStorage.setItem('quiz_user_name', name);
        localStorage.setItem('saved_user_name', name);
        
        window.location.href = 'test.html';
    });
</script>

</body>
</html>
